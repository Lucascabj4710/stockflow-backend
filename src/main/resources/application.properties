spring.application.name=stockflow-backend

# Base de datos
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/stockflow}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# JWT
security.jwt.secret.key=${JWT_SECRET_KEY:bWljbGF2ZXN1cGVyc2VjcmVjcmV0YQ==}
security.jwt.user.generator=${JWT_USER_GENERATOR:StockflowBackend}